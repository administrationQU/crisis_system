{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/protocol.css' %}">

<div class="container">

    <div class="header">
        <h1>{{ protocol.topic.title }}</h1>
        <span class="badge">{{ role|upper }}</span>
    </div>

    {% for step in steps %}

    <div class="step-card">

        <div class="step-title">
            Step {{ step.step_number }}
        </div>

        <div>{{ step.description|safe }}</div>

        {% if step.image %}
            <img src="{{ step.image.url }}">
        {% endif %}

        {% if step.video_url %}
            <iframe src="{{ step.video_url }}"></iframe>
        {% endif %}

    </div>

    {% endfor %}

</div>

{% endblock %}
